<!-- RIGHT SIDE -->
<div class="right">

    <div class="top-title">
        <h2>SecureAuth</h2>
        <p>Login or create your account</p>
    </div>

    <div class="tabs">
        <button class="active" type="button">Login</button>
        <button type="button">Register</button>
    </div>

    <form id="authForm">

        <div class="input-box">
            <label>Name (for register)</label>
            <input type="text" id="name" placeholder="Your name">
        </div>

        <div class="input-box">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="gulfam@example.com" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button class="btn" type="submit">Submit</button>

    </form>

    <div class="footer">
        © 2026 Gulfam Hameed | DevOps Authentication System
    </div>

</div>

<script>
let mode = "login";

// switch mode
document.querySelectorAll(".tabs button")[0].onclick = () => {
    mode = "login";
};

document.querySelectorAll(".tabs button")[1].onclick = () => {
    mode = "register";
};

// form submit
document.getElementById("authForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    let url = "";

    if (mode === "register") {
        url = "http://51.20.55.228:3000/api/register";
    } else {
        url = "http://51.20.55.228:3000/api/login";
    }

    const bodyData =
        mode === "register"
            ? { name, email, password }
            : { email, password };

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(bodyData)
        });

        const data = await res.json();

        alert(data.message);

        console.log(data);

    } catch (error) {
        alert("Backend not reachable");
        console.log(error);
    }
});
</script>
